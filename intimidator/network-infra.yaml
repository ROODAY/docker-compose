# for port mapping, left side is host, right side is container
networks:
  public:
    name: public
    driver: bridge
  private:
    name: private
    driver: bridge
services:
  tailscale:
    image: tailscale/tailscale
    container_name: tailscale
    hostname: intimidator
    networks:
      - private
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:container --advertise-exit-node
    volumes:
      - ./data/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped
    labels:
      - traefik.enable=false
  traefik-ts:
    image: traefik
    container_name: traefik-ts
    restart: unless-stopped
    network_mode: service:tailscale
    volumes:
      - ./data/traefik-tailscale/letsencrypt:/letsencrypt
      - ./data/traefik-tailscale/dynamic.yml:/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - /run/user/1000/docker.sock:/var/run/docker.sock:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - CLOUDFLARE_EMAIL=${TRAEFIK_CLOUDFLARE_EMAIL}
      - CLOUDFLARE_API_KEY=${TRAEFIK_CLOUDFLARE_API_KEY}
    command:
      - --accesslog=true
      - --providers.docker=true
      - --providers.file.filename=/dynamic.yml
      - --api
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=${TRAEFIK_CLOUDFLARE_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
    labels:
      - traefik.enable=true

      # Traefik Dashboard
      - traefik.http.routers.traefik-ts.rule=Host(`traefik.intimidator.ts.rooday.com`)
      - traefik.http.services.traefik-ts.loadbalancer.server.port=8080
      - traefik.http.routers.traefik-ts.service=api@internal
      - traefik.http.routers.traefik-ts.entrypoints=websecure
      - traefik.http.routers.traefik-ts.tls.certresolver=cloudflare
      - traefik.http.routers.traefik-ts.middlewares=myauth
      - traefik.http.middlewares.myauth.basicauth.users=${TRAEFIK_AUTH}

      # Proxmox Reverse Proxy
      - traefik.http.routers.proxmox.rule=Host(`intimidator.ts.rooday.com`)
      - traefik.http.routers.proxmox.entrypoints=websecure
      - traefik.http.routers.proxmox.tls.certresolver=cloudflare
      - traefik.http.routers.proxmox.service=proxmox
      - traefik.http.services.proxmox.loadbalancer.server.url=https://192.168.0.162:8006
      - traefik.http.services.proxmox.loadbalancer.serversTransport=insecure@file
      - traefik.http.services.proxmox.loadbalancer.passhostheader=true

      # Home Assistant Reverse Proxy
      - traefik.http.routers.homeassistant.rule=Host(`ha.intimidator.ts.rooday.com`)
      - traefik.http.routers.homeassistant.entrypoints=websecure
      - traefik.http.routers.homeassistant.tls.certresolver=cloudflare
      - traefik.http.routers.homeassistant.service=homeassistant
      - traefik.http.services.homeassistant.loadbalancer.server.url=http://192.168.0.195:8123
      - traefik.http.services.homeassistant.loadbalancer.passhostheader=true
      - traefik.http.middlewares.ha-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.ha-headers.headers.customrequestheaders.X-Forwarded-Host=ha.intimidator.ts.rooday.com
      - traefik.http.middlewares.ha-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.routers.homeassistant.middlewares=ha-headers
  traefik:
    image: traefik
    container_name: traefik
    restart: unless-stopped
    networks:
      - public
    volumes:
      - ./data/traefik/letsencrypt:/letsencrypt
      - ./data/traefik/dynamic.yml:/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - /run/user/1000/docker.sock:/var/run/docker.sock:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 80:80
      - 443:443
    environment:
      - CLOUDFLARE_EMAIL=${TRAEFIK_CLOUDFLARE_EMAIL}
      - CLOUDFLARE_API_KEY=${TRAEFIK_CLOUDFLARE_API_KEY}
    command:
      - --accesslog=true
      - --api
      - --providers.docker=true
      - --providers.file.filename=/dynamic.yml
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      # - --entrypoints.websecure-immich.address=:8443  # Keep the same port!
      # - --entrypoints.websecure-immich.http.tls=true
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=600s
      - --entrypoints.websecure.transport.respondingTimeouts.idleTimeout=600s
      - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=600s
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=${TRAEFIK_CLOUDFLARE_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.intimidator.rooday.com`)
      - traefik.http.services.traefik.loadbalancer.server.port=8080
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=cloudflare
      - traefik.http.routers.traefik.middlewares=myauth
      - traefik.http.middlewares.myauth.basicauth.users=${TRAEFIK_AUTH}
  cloudflare-ddns:
    image: timothyjmiller/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    security_opt:
      - no-new-privileges:true
    network_mode: "host"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./data/cloudflare-ddns/ddns.config.json:/config.json
    restart: unless-stopped
    labels:
      - traefik.enable=false
